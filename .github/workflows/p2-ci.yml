name: p2-ci

on:
  push:
    paths:
      - "p2/**"
      - ".github/workflows/p2-ci.yml"
  pull_request:
    paths:
      - "p2/**"
      - ".github/workflows/p2-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r p2/requirements.txt

      - name: Run tests
        run: python -m pytest p2/tests
